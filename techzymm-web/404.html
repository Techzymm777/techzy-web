<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Page not found | Techzy" />
    <title>404 | Techzy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <script defer src="assets/main.js"></script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script defer src="assets/amplitude-init.js"></script>

  <body data-page="404">
    <a class="skip-link" href="#main" data-i18n="common.skip">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" data-i18n-attr="aria-label:common.brandHomeAria">
          <img
            class="brand-logo"
            src="assets/techzy-logo.svg"
            alt="Techzy"
            width="190"
            height="32"
          />
        </a>

        <div class="header-actions">
          <nav class="nav" id="primaryNav" aria-label="Primary">
            <a href="index.html" data-nav="home" data-i18n="nav.home">Home</a>
            <a href="about.html" data-nav="about" data-i18n="nav.about">About Us</a>
            <a href="products.html" data-nav="products" data-i18n="nav.products">Products</a>
            <a href="contact.html" data-nav="contact" data-i18n="nav.contact">Contact</a>
          </nav>
          <button
            class="nav-toggle"
            type="button"
            id="navToggle"
            aria-controls="primaryNav"
            aria-expanded="false"
            data-i18n-attr="aria-label:common.menuToggleAria"
          >
            <span class="nav-toggle-icon" aria-hidden="true"></span>
          </button>
          <button
            class="lang-btn"
            type="button"
            id="langToggle"
            data-i18n-attr="aria-label:common.langToggleAria"
          >
            EN
          </button>
        </div>
      </div>
    </header>

    <main id="main">
      <section class="hero">
        <div class="container hero-inner">
          <div class="hero-copy">
            <p class="kicker">404</p>
            <h1 class="title-xl">Page not found.</h1>
            <p class="lede">
              The page you are looking for does not exist or may have moved.
            </p>
            <div class="hero-actions">
              <a class="btn btn-primary" href="index.html">Go Home</a>
              <a class="btn btn-ghost" href="products.html">Browse Products</a>
            </div>
          </div>

          <div class="hero-visual" aria-hidden="true">
            <div class="device-card device-laptop">
              <div class="device-top"></div>
              <div class="device-screen">
                <div class="device-glow"></div>
                <div class="device-lines"></div>
              </div>
              <div class="device-base"></div>
            </div>
            <div class="device-card device-tower">
              <div class="tower-face"></div>
              <div class="tower-port"></div>
              <div class="tower-port"></div>
              <div class="tower-port"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <div class="brand footer-brand">
            <img
              class="brand-logo"
              src="assets/techzy-logo.svg"
              alt="Techzy"
              width="190"
              height="32"
            />
          </div>
          <p class="muted" data-i18n="footer.tagline">
            Minimalist laptops and desktops for modern work.
          </p>
        </div>
        <div class="footer-links" aria-label="Footer">
          <a href="about.html" data-i18n="footer.about">About</a>
          <a href="products.html" data-i18n="footer.products">Products</a>
          <a href="contact.html" data-i18n="footer.contact">Contact</a>
          <a href="#" id="backToTop" data-i18n="footer.backToTop">Back to top</a>
        </div>
      </div>
      <div class="container footer-bottom">
        <small class="muted"
          >© <span id="year"></span> <span data-i18n="footer.copyrightName">Techzy</span>.</small
        >
        <small class="muted" data-i18n="footer.themeLine">Built in black, gray, and white.</small>
      </div>
    </footer>
